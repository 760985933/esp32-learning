name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 赋予 GITHUB_TOKEN 发布 Pages 所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新推送会取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # 本站是纯静态 HTML，无需构建步骤：直接把仓库根目录作为产物上传
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # 站点根目录（index.html 所在位置）

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
